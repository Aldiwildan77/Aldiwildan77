name: Latest Medium Story Workflow

on:
  schedule:
    # Runs every hour
    - cron: '00 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-medium-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://medium.com/feed/@aldiwildan"
          commit_message: "Updated README with latest Medium posts"
          max_post_count: 3
          date_format: "mmm d, yyyy"
          committer_email: "aldiwild77@gmail.com"
